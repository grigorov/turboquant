name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  # -------------------------------------------------------------- Python + Rust
  python-rust-integration:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            rust/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('rust/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Install maturin
        run: |
          python -m pip install --upgrade pip
          pip install maturin numpy scipy pytest hypothesis ruff

      - name: Build Python package with maturin
        run: |
          python -m venv .venv
          source .venv/bin/activate
          pip install --upgrade pip
          pip install maturin numpy scipy pytest hypothesis ruff
          maturin develop --release

      - name: Lint with ruff
        run: |
          source .venv/bin/activate
          ruff check turboquant.py fuzzer.py tests/

      - name: Run unit tests
        run: |
          source .venv/bin/activate
          pytest tests/ -v

      - name: Run fuzzer (5 iterations)
        run: |
          source .venv/bin/activate
          python fuzzer.py --iters 5

      - name: Run benchmark (smoke test)
        run: |
          source .venv/bin/activate
          python benchmark.py --d 64 --n 100 --bits 1 2 4

  # -------------------------------------------------------------- Python pure
  python-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install numpy scipy pytest hypothesis ruff

      - name: Lint with ruff
        run: |
          ruff check turboquant.py fuzzer.py tests/

      - name: Run unit tests
        run: |
          pytest tests/ -v

      - name: Run fuzzer (5 iterations)
        run: |
          python fuzzer.py --iters 5

      - name: Run benchmark (smoke test)
        run: |
          python benchmark.py --d 64 --n 100 --bits 1 2 4

  # ------------------------------------------------------------------ Rust
  rust-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            rust/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('rust/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Build
        working-directory: rust
        run: cargo build --verbose

      - name: Run tests
        working-directory: rust
        run: cargo test --verbose

      - name: Clippy (lint)
        working-directory: rust
        run: cargo clippy -- -D warnings

      - name: Run fuzzer (5 iterations)
        working-directory: rust
        run: cargo run --bin fuzzer -- --iters 5

      - name: Run demo (smoke test)
        working-directory: rust
        run: cargo run --bin turboquant -- --iters 1

      - name: Build benchmarks (compile check)
        working-directory: rust
        run: cargo build --bench benchmarks

  # ------------------------------------------------------------------ Demo smoke
  python-demo:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install numpy scipy

      - name: Run demo (smoke test)
        run: |
          python turboquant.py
